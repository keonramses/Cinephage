changelog:
  exclude:
    labels:
      - skip-changelog
      - no-release-notes
    authors:
      - dependabot[bot]
      - github-actions[bot]
      - renovate[bot]
  categories:
    - title: 'Breaking Changes'
      labels:
        - breaking-change
        - major
    - title: 'Features'
      labels:
        - feature
        - enhancement
    - title: 'Bug Fixes'
      labels:
        - bug
        - bugfix
        - fix
    - title: 'Documentation'
      labels:
        - documentation
        - docs
    - title: 'Maintenance'
      labels:
        - chore
        - ci
        - dependencies
        - refactor
