name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual release)'
        required: true
        type: boolean
        default: true
      force_bump:
        description: 'Force bump type (auto|patch|minor|major)'
        required: true
        type: choice
        options: [auto, patch, minor, major]
        default: auto

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  detect-bump:
    name: Detect Version Bump
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.bump.outputs.bump }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo '')"
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, defaulting to patch"
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Last tag: ${LAST_TAG}"

          # Get commits since last tag
          COMMITS="$(git log "${LAST_TAG}..HEAD" --pretty=format:%s)"

          if [ -z "$COMMITS" ]; then
            echo "No commits since last tag"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for manual override
          if echo "$COMMITS" | grep -qi "Release-As:"; then
            OVERRIDE="$(echo "$COMMITS" | grep -i "Release-As:" | head -1 | sed 's/.*Release-As: *//i' | tr -d ' ')"
            if [ -n "$OVERRIDE" ]; then
              echo "Manual override detected: ${OVERRIDE}"
              echo "bump=manual" >> "$GITHUB_OUTPUT"
              echo "version=${OVERRIDE}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Check for breaking changes
          if echo "$COMMITS" | grep -qE "^[a-z]+(\([^)]*\))?!:|BREAKING CHANGE:"; then
            echo "Breaking change detected"
            echo "bump=major" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for features (excluding ci/docs/test/style only changes)
          if echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?: " | grep -qvE "^feat\((ci|docs|test|style)\):"; then
            echo "Feature detected"
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for fixes, perf, refactor (excluding ci/docs/test/style only changes)
          if echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\([^)]*\))?: " | grep -qvE "^(fix|perf|refactor)\((ci|docs|test|style)\):"; then
            echo "Fix/perf/refactor detected"
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No releasable commits found (only docs/test/style/ci changes)"
          echo "bump=none" >> "$GITHUB_OUTPUT"

  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: detect-bump
    if: needs.detect-bump.outputs.bump != 'none'
    outputs:
      tag: v${{ steps.version.outputs.next }}
      next_version: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install git-cliff
        env:
          CLIFF_VERSION: 2.8.0
        run: |
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | \
            tar -xz --strip-components=1 -C /usr/local/bin "git-cliff-${CLIFF_VERSION}/git-cliff"

      - name: Compute next version
        id: version
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          BUMP="${{ needs.detect-bump.outputs.bump }}"

          if [ "$BUMP" == "manual" ]; then
            NEXT_VERSION="${{ needs.detect-bump.outputs.version }}"
          else
            MAJOR="$(echo "$CURRENT_VERSION" | cut -d. -f1)"
            MINOR="$(echo "$CURRENT_VERSION" | cut -d. -f2)"
            PATCH="$(echo "$CURRENT_VERSION" | cut -d. -f3)"

            case "$BUMP" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current: ${CURRENT_VERSION} → Next: ${NEXT_VERSION}"

      - name: Update package.json and package-lock.json
        run: |
          NEXT_VERSION="${{ steps.version.outputs.next }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEXT_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
            
            if (fs.existsSync('package-lock.json')) {
              const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
              lock.version = '${NEXT_VERSION}';
              if (lock.packages && lock.packages['']) {
                lock.packages[''].version = '${NEXT_VERSION}';
              }
              fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, '\t') + '\n');
            }
          "

      - name: Generate CHANGELOG
        run: |
          git-cliff --tag "v${{ steps.version.outputs.next }}" -o CHANGELOG.md

      - name: Format CHANGELOG
        run: npx prettier --write CHANGELOG.md

      - name: Generate release notes
        run: |
          git-cliff --tag "v${{ steps.version.outputs.next }}" --latest -o RELEASE_NOTES.md

      - name: Commit version bump and changelog
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.next }}"

      - name: Create and push tag
        id: push-tag
        run: |
          TAG="v${{ steps.version.outputs.next }}"
          git tag "$TAG"
          # Push only the tag, not the branch (branch may be protected)
          git push origin "$TAG"
          echo "Created and pushed tag: ${TAG}"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate paraglide files
        run: rm -rf src/lib/paraglide && npm run build

      - name: Run type check
        run: npm run check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  docker-release:
    name: Docker Release
    needs: [bump-version, lint, typecheck, test, build]
    uses: ./.github/workflows/docker-build.yml
    with:
      release_tag: ${{ needs.bump-version.outputs.tag }}
      checkout_ref: ${{ needs.bump-version.outputs.tag }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  github-release:
    name: Create GitHub Release
    needs: [bump-version, docker-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.bump-version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag

      - name: Announce to Discord
        uses: SethCohen/github-releases-to-discord@v1.19.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          color: '2067276'
          username: 'Cinephage Releases'
          avatar_url: 'https://raw.githubusercontent.com/MoldyTaint/Cinephage/main/static/logo.png'
          content: '<@&1449935793958293585>'
          footer_title: 'Cinephage'
          footer_icon_url: 'https://raw.githubusercontent.com/MoldyTaint/Cinephage/main/static/logo.png'
          footer_timestamp: true
