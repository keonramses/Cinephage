name: Publish Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  publish:
    name: Publish to API
    runs-on: ubuntu-latest

    steps:
      - name: Set tag
        run: echo "TAG=${{ inputs.tag_name || github.ref_name }}" >> "$GITHUB_ENV"

      - name: Skip dev prereleases
        run: |
          if echo "$TAG" | grep -qE '\-dev\.[0-9]+$'; then
            echo "Skipping dev prerelease: $TAG"
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve tag commit SHA
        run: echo "COMMIT=$(git rev-list -n 1 "$TAG")" >> "$GITHUB_ENV"

      - name: Publish build to Cinephage API
        run: |
          VERSION="${TAG#v}"

          echo "Publishing ${VERSION} (${COMMIT})"

          RESPONSE=$(curl -sS -w '\n%{http_code}' \
            -X POST "${{ secrets.CINEPHAGE_BUILD_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.CINEPHAGE_BUILD_KEY }}" \
            -d "{\"version\":\"${VERSION}\",\"commit\":\"${COMMIT}\",\"platform\":\"cinephage\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP ${HTTP_CODE}"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::API returned HTTP ${HTTP_CODE}, expected 201: ${BODY}"
            exit 1
          fi

          echo "Published successfully: ${BODY}"
