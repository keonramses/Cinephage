name: Publish Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  publish:
    name: Publish to API
    runs-on: ubuntu-latest

    steps:
      - name: Skip dev prereleases
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          if echo "$TAG" | grep -qE '\-dev\.[0-9]+$'; then
            echo "Skipping dev prerelease: ${TAG}"
            exit 0
          fi

      - name: Publish release to API
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          COMMIT="${GITHUB_SHA}"

          echo "Publishing release ${TAG} (${COMMIT})"

          RESPONSE=$(curl -sS -w '\n%{http_code}' -X POST "https://api.cinephage.net/sys/a7x9k2m/publish" \
            -H "Content-Type: application/json" \
            -H "X-Automation-Key: ${{ secrets.AUTOMATION_KEY }}" \
            -d "{\"version\":\"${VERSION}\",\"commit\":\"${COMMIT}\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP ${HTTP_CODE}"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::API returned HTTP ${HTTP_CODE}: ${BODY}"
            exit 1
          fi

          if [ "$(echo "$BODY" | jq -r '.success')" != "true" ]; then
            echo "::error::API did not return success: ${BODY}"
            exit 1
          fi

          echo "Published successfully: ${BODY}"
