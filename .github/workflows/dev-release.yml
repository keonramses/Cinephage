name: Dev Prerelease

on:
  push:
    branches: [dev]

permissions:
  contents: write
  actions: write

jobs:
  dev-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next dev version
        id: version
        run: |
          # Get the latest stable tag
          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo 'v0.0.0')"
          echo "Last stable tag: ${LAST_TAG}"

          # Extract version components (remove v prefix)
          VERSION="${LAST_TAG#v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f2)"
          PATCH="$(echo "$VERSION" | cut -d. -f3)"

          # Determine bump type from commits since last stable tag
          COMMITS="$(git log "${LAST_TAG}..HEAD" --pretty=format:%s)"

          if echo "$COMMITS" | grep -qE "^[a-z]+(\([^)]*\))?!:|BREAKING CHANGE:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -E "^feat(\([^)]*\))?: " | grep -vE "^feat\((ci|docs|test|style)\):" | grep -q .; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Count existing dev prereleases for this base version
          DEV_COUNT="$(git tag --list "v${BASE_VERSION}-dev.*" | wc -l | tr -d ' ')"
          NEXT_DEV=$((DEV_COUNT + 1))

          NEXT_VERSION="${BASE_VERSION}-dev.${NEXT_DEV}"
          TAG="v${NEXT_VERSION}"

          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Next dev version: ${TAG}"

      - name: Update package.json version
        run: |
          NEXT_VERSION="${{ steps.version.outputs.next_version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEXT_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

      - name: Create and push dev tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git add package.json
          git commit -m "chore: prerelease ${TAG}" || echo "No changes to commit"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created dev prerelease: ${TAG}"

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BASE_VERSION="${{ steps.version.outputs.base_version }}"
          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*' --exclude '*-dev.*' 2>/dev/null || echo '')"

          if [ -n "$LAST_TAG" ]; then
            echo "## Changes since ${LAST_TAG}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" >> RELEASE_NOTES.md
          else
            echo "## Changes" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log --pretty=format:"- %s" >> RELEASE_NOTES.md
          fi

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG (dev prerelease)" \
            --notes-file RELEASE_NOTES.md \
            --prerelease

      - name: Trigger Docker build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build.yml',
              ref: '${{ steps.version.outputs.tag }}',
              inputs: {
                release_tag: '${{ steps.version.outputs.tag }}',
                checkout_ref: '${{ steps.version.outputs.tag }}'
              }
            });
