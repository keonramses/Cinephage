# Release Pipeline
#
# Triggered by pushing a semver tag (v1.0.0, v0.2.0, etc.) using PATCH range 0-9.
#  1. CI gates — lint, typecheck, test, build (parallel)
#  2. Docker images — multi-arch build via reusable docker-build workflow
#  3. GitHub Release — auto-generated release notes
#
# Docker images are tagged: vX.Y.Z, X.Y.Z, X.Y, X, latest
# Discord announcement fires automatically via release-discord.yml

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate paraglide files
        run: rm -rf src/lib/paraglide && npm run build

      - name: Run type check
        run: npm run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  docker-release:
    name: Docker Release
    needs: [lint, typecheck, test, build]
    uses: ./.github/workflows/docker-build.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  github-release:
    name: Create GitHub Release
    needs: [docker-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        env:
          CLIFF_VERSION: 2.8.0
        run: |
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | \
            tar -xz --strip-components=1 -C /usr/local/bin "git-cliff-${CLIFF_VERSION}/git-cliff"

      - name: Generate changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git-cliff --tag "$TAG" --latest -o CHANGELOG.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file CHANGELOG.md \
            --verify-tag
