name: Sync main to dev

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync needed
        id: check
        run: |
          git fetch origin dev
          AHEAD=$(git rev-list --count origin/dev..origin/main)
          echo "ahead=${AHEAD}" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" -eq 0 ]; then
            echo "main is up to date with dev, skipping"
          fi

      - name: Create sync PR
        if: steps.check.outputs.ahead > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base dev --head main --state open --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Sync PR #${EXISTING} already exists, updating"
            gh pr edit "$EXISTING" --body "Auto-sync: merge latest release commits from main into dev."
            gh pr merge --auto --squash "$EXISTING"
          else
            PR_URL=$(gh pr create \
              --base dev \
              --head main \
              --title "sync: merge main into dev" \
              --body "Auto-sync: merge latest release commits from \`main\` into \`dev\`.")
            gh pr merge --auto --squash "$PR_URL"
          fi
