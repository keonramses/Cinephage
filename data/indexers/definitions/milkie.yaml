---
id: milkie
name: milkie.cc
description: 'Milkie.cc (ME) is a private torrent tracker for 0day / general.'
type: private
language: en-US
encoding: UTF-8
protocol: torrent
links:
  - https://milkie.cc/

settings:
  - name: apikey
    type: password
    label: API Key
    required: true
  - name: info_apikey
    type: info
    label: 'Getting an API Key'
    default: 'You can get an API Key from your <a href="https://milkie.cc/settings/security" target="_blank">security settings</a>'

caps:
  categories:
    '1': Movies
    '2': TV
    '3': Audio
    '4': Console
    '5': Books
    '6': PC
    '7': XXX

  categorymappings:
    - { id: 1, cat: Movies, desc: 'Movies' }
    - { id: 2, cat: TV, desc: 'TV' }
    - { id: 3, cat: Audio, desc: 'Music' }
    - { id: 4, cat: PC/Games, desc: 'Game' }
    - { id: 4, cat: Console, desc: 'Game' }
    - { id: 5, cat: Books, desc: 'Ebooks' }
    - { id: 6, cat: PC/0day, desc: 'App' }
    - { id: 6, cat: PC/ISO, desc: 'App' }
    - { id: 6, cat: PC/Mac, desc: 'App' }
    - { id: 6, cat: PC/Mobile-Android, desc: 'App' }
    - { id: 6, cat: PC/Mobile-iOS, desc: 'App' }
    - { id: 6, cat: PC/Mobile-Other, desc: 'App' }
    - { id: 6, cat: Other, desc: 'App' }
    - { id: 7, cat: XXX, desc: 'Adult' }

  modes:
    search: [q]
    tv-search: [q]
    movie-search: [q]
    music-search: [q]
    book-search: [q]

  allowrawsearch: true

  searchFormats:
    episode:
      - standard
    movie:
      - yearOnly

search:
  path: /api/v1/torrents
  method: get
  headers:
    x-milkie-auth:
      - '{{ .Config.apikey }}'
  inputs:
    query: '{{ .Keywords }}'
    ps: '100' # Page size
    categories: '{{ join .Categories "," }}'

  response:
    type: json

  rows:
    selector: torrents
    count:
      selector: hits

  fields:
    guid:
      selector: id
    title:
      selector: releaseName
    category:
      selector: category
      filters:
        - name: re_replace
          args: ['^2000$', '1']
        - name: re_replace
          args: ['^3000$', '3']
        - name: re_replace
          args: ['^4000$', '6']
        - name: re_replace
          args: ['^4050$', '4']
        - name: re_replace
          args: ['^5000$', '2']
        - name: re_replace
          args: ['^6000$', '7']
        - name: re_replace
          args: ['^7000$', '5']
        - name: re_replace
          args: ['^100001$', '1']
        - name: re_replace
          args: ['^100002$', '2']
        - name: re_replace
          args: ['^100003$', '3']
        - name: re_replace
          args: ['^100004$', '4']
        - name: re_replace
          args: ['^100005$', '5']
        - name: re_replace
          args: ['^100006$', '6']
        - name: re_replace
          args: ['^100007$', '7']
    download:
      selector: id
      filters:
        - name: prepend
          args: 'api/v1/torrents/'
        - name: append
          args: '/torrent?key={{ .Config.apikey }}'
    details:
      selector: id
      filters:
        - name: prepend
          args: 'browse/'
    publishDate:
      selector: createdAt
      filters:
        - name: dateparse
          args: '2006-01-02T15:04:05.000000Z'
    size:
      selector: size
    grabs:
      selector: downloaded
    seeders:
      selector: seeders
    partialSeeders:
      selector: partialSeeders
    leechers:
      selector: leechers
    verified:
      selector: verified
    groupId:
      selector: groupId
    comments:
      selector: comments
    downloadvolumefactor:
      text: 0
    uploadvolumefactor:
      text: 1
    minimumratio:
      text: 1
    minimumseedtime:
      text: 172800
    imdbid:
      selector: externals.imdb
      optional: true
    tmdbid:
      selector: externals.tmdb
      optional: true
    tvmaze:
      selector: externals.tvmaze
      optional: true
