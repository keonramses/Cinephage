---
# Cinephage Library Streaming Indexer
# This internal indexer queries the local library database to provide
# streaming URLs for content in your library.
#
# Quality is determined at playback time by the streaming proxy,
# which extracts streams from providers and selects the best available quality.

id: cinephage-stream
name: Cinephage Library
description: Stream content from your local media library via .strm files
type: private
protocol: streaming
language: en-US
encoding: UTF-8

links:
  - https://api.cinephage.net

settings:
  - name: useHttps
    type: checkbox
    label: Use HTTPS
    default: false
    helpText: 'Enable only if your own Cinephage server address is exposed over HTTPS. If you use a non-default port for HTTP or HTTPS, include it in Cinephage Server Address.'

  - name: externalHost
    type: text
    label: Cinephage Server Address
    default: ''
    placeholder: '192.168.1.100:3000'
    helpText: 'Manual address for your own Cinephage server, used by Jellyfin and .strm playback. You can enter an IP address or a web domain. Include the port when Cinephage is not using the default HTTP or HTTPS port, for example 192.168.1.100:3000 or media.example.com:8443. Do not enter api.cinephage.net here.'

  - name: cinephageCommit
    type: text
    label: Cinephage API Commit
    default: ''
    placeholder: 'abc123def'
    helpText: 'Manual dev value used for X-Cinephage-Commit. Must match the current published build accepted by api.cinephage.net.'

  - name: cinephageVersion
    type: text
    label: Cinephage API Version
    default: ''
    placeholder: '2.3.3'
    helpText: 'Manual dev value used for X-Cinephage-Version. Must match the current published build accepted by api.cinephage.net.'

# Protocol-specific configuration for streaming
protocolConfig:
  streaming:
    type: internal
    dataSource: database

# Search capabilities
caps:
  modes:
    search: [q]
    movie-search: [q, tmdbid, imdbid]
    tv-search: [q, tmdbid, tvdbid, imdbid, season, ep]
  categories:
    '2000': Movies
    '5000': TV
  categorymappings:
    - id: Movies
      cat: '2000'
      desc: Movies
      default: true
    - id: TV
      cat: '5000'
      desc: TV Shows
      default: true

# Search configuration (uses DatabaseQueryExecutor defaults)
# The executor handles movie/TV queries against the local database
search:
  response:
    type: json
