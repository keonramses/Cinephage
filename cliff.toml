[changelog]
header = """
"""
body = """
{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/MoldyTaint/Cinephage/commit/{{ commit.id }})) — by {{ commit.author.name }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
<!-- Generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^refactor", group = "<!-- 2 -->Refactoring" },
    { message = "^perf", group = "<!-- 3 -->Performance" },
    { message = "^style", group = "<!-- 4 -->Styling" },
    { message = "^docs", group = "<!-- 5 -->Documentation" },
    { message = "^test", group = "<!-- 6 -->Testing" },
    { message = "^chore\\(release\\)|^chore: bump version", skip = true },
    { message = "^chore", group = "<!-- 7 -->Miscellaneous" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
